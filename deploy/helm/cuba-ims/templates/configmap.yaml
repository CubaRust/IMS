apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cuba-ims.fullname" . }}-config
  labels:
    {{- include "cuba-ims.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  HTTP_HOST: {{ .Values.config.httpHost | quote }}
  HTTP_PORT: {{ .Values.config.httpPort | quote }}
  DATABASE_MAX_CONNECTIONS: {{ .Values.config.databaseMaxConnections | quote }}
  JWT_TTL_SECONDS: {{ .Values.config.jwtTtlSeconds | quote }}
  MIGRATION_MODE: {{ .Values.config.migrationMode | quote }}
  RUST_LOG: {{ .Values.config.rustLog | quote }}
