version: "3.9"
# 全栈运行:pg + migrator + app
# 用法:
#   docker compose -f docker-compose.full.yml up --build
#
# 访问:
#   API:      http://localhost:8080/health
#   Swagger:  http://localhost:8080/docs
#   Metrics:  http://localhost:8080/metrics

services:
  pg:
    image: postgres:16
    environment:
      POSTGRES_USER: cuba
      POSTGRES_PASSWORD: cuba
      POSTGRES_DB: cuba_ims
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuba -d cuba_ims"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrator:
    # 临时跑一次 migration 然后退出(用 psql 客户端镜像)
    image: postgres:16
    depends_on:
      pg:
        condition: service_healthy
    environment:
      PGPASSWORD: cuba
      PGHOST: pg
      PGUSER: cuba
      PGDATABASE: cuba_ims
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      bash -c "
        set -e;
        for f in /migrations/*.sql; do
          echo '>>> applying' $$f;
          psql -v ON_ERROR_STOP=1 -f $$f;
        done;
        echo '✅ migrations applied'
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      APP_ENV: prod
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      DATABASE_URL: postgres://cuba:cuba@pg:5432/cuba_ims
      DATABASE_MAX_CONNECTIONS: "20"
      JWT_SECRET: "change-me-in-real-prod-use-at-least-32-chars"
      JWT_TTL_SECONDS: "86400"
      MIGRATION_MODE: manual
      RUST_LOG: info,cuba_=info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/cuba-server", "--version"]
      interval: 30s
      timeout: 3s
      start_period: 10s

volumes:
  pgdata:
